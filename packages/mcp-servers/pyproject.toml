[project]
name = "agentic-mlops-mcp-servers"
version = "0.1.0"
description = "MCP Servers: jupyter, feature-store, data-catalog"
requires-python = ">=3.11"

dependencies = [
    "mcp>=1.0",
    "jupyter-client>=8.6",
    "feast>=0.40",
    "sqlalchemy>=2.0",
    "asyncpg>=0.29",
    "agentic-mlops-shared",
]

[tool.uv.sources]
agentic-mlops-shared = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["mcp_servers"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
