[project]
name = "agentic-mlops-agent-core"
version = "0.1.0"
description = "Agent Core: Planner, Executor, Critic, Memory, Skills"
requires-python = ">=3.11"

dependencies = [
    "langgraph>=0.2",
    "anthropic>=0.30",
    "httpx>=0.27",
    "redis>=5.0",
    "asyncpg>=0.29",
    "pgvector>=0.3",
    "agentic-mlops-shared",
]

[tool.uv.sources]
agentic-mlops-shared = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["agent_core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
