[project]
name = "agentic-mlops-shared"
version = "0.1.0"
description = "Shared utilities: telemetry, logging, config"
requires-python = ">=3.11"

dependencies = [
    "structlog>=24.0",
    "opentelemetry-api>=1.25",
    "opentelemetry-sdk>=1.25",
    "opentelemetry-exporter-otlp>=1.25",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
]

[tool.hatch.build.targets.wheel]
packages = ["shared_lib"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
